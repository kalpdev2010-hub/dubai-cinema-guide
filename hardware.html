<body>
    <div class="nav">

    <h1>⚙️ Reference Hardware Guide</h1>
    
    <div class="filter-container">
        <select id="catFilter" onchange="filterHardware()">
            <option value="all">Show All Hardware Tiers</option>
            <option value="cat0">Soundbars: Ultra-Budget</option>
            <option value="cat1">Soundbars: Mid-Range</option>
            <option value="cat2">Soundbars: Premium Standalone</option>
            <option value="cat3">Soundbars: Flagship Theater</option>
            <option value="cat4">Displays: Mini-LED</option>
            <option value="cat5">Displays: OLED & QD-OLED</option>
            <option value="cat6">AV Receivers: Entry & Mid-Range</option>
            <option value="cat7">AV Receivers: Flagship</option>
            <option value="cat8">Speakers: High-Value & Premium</option>
            <option value="cat9">Subwoofers: The Muscle</option>
            <option value="cat10">Speakers: Bookshelf & Surrounds</option>
            <option value="cat11">Speakers: Floorstanding (Tall Boys)</option>
            <option value="cat12">Speakers: Dolby Atmos & Height</option>
            <option value="cat13">Speakers: Center Channels</option>
        </select>
    </div>

   
    <script>
        // 1. Open the Hardware Vault
        fetch('hardware.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('hardwareContainer');
                
                // 2. Loop through each Category (Folders)
                data.forEach(category => {
                    const group = document.createElement('div');
                    group.className = 'category-group';
                    group.setAttribute('data-category', category.category_id);
                    
                    const title = document.createElement('h2');
                    title.className = 'section-title';
                    title.textContent = category.category_title;
                    group.appendChild(title);
                    
                    const grid = document.createElement('div');
                    grid.className = 'hardware-grid';
                    
                    // 3. Loop through Items inside the Category
                    category.items.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div>
                                <span class="badge">${item.badge}</span>
                                <div class="hw-model">${item.model}</div>
                                <p class="desc">${item.description}</p>
                            </div>
                            <a href="${item.amazon_link}" target="_blank" rel="nofollow" class="btn">Check Price on Amazon.ae</a>
                        `;
                        grid.appendChild(card);
                    });
                    
                    group.appendChild(grid);
                    container.appendChild(group);
                });
            })
            .catch(error => console.error('Vault connection failed:', error));

        // 4. Keep the Dropdown Filter working
        function filterHardware() {
            let selected = document.getElementById('catFilter').value;
            let groups = document.getElementsByClassName('category-group');
            for(let i=0; i<groups.length; i++) {
                if(selected === "all" || groups[i].getAttribute('data-category') === selected) {
                    groups[i].style.display = "block";
                } else {
                    groups[i].style.display = "none";
                }
            }
        }
    </script>
