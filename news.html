<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech News & Radar | Cinema Gear</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(135deg, #1a1a1a, #000000);
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 2px solid #ffd700;
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        header p {
            color: #aaaaaa;
            font-size: 1.2rem;
            margin-top: 10px;
        }
        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
        }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .news-card {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid #ffd700;
            transition: transform 0.3s ease;
        }
        .news-card:hover {
            transform: translateY(-5px);
        }
        .status-badge {
            display: inline-block;
            background: #ffd700;
            color: #000;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .news-date {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .news-title {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            color: #ffffff;
        }
        .news-headline {
            font-size: 1.1rem;
            color: #cccccc;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .news-desc {
            color: #aaaaaa;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .track-btn {
            display: inline-block;
            background: transparent;
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: default;
        }
        .track-btn:hover {
            background: #ffd700;
            color: #000;
        }
        .network-footer {
            background-color: #0a0a0a;
            padding: 3rem 1rem;
            text-align: center;
            border-top: 1px solid #333;
            margin-top: 4rem;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .network-footer h4 {
            color: #ffffff;
            margin-top: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
        }
        .network-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .network-links a {
            color: #cccccc;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 10px 20px;
            border: 1px solid #444;
            border-radius: 50px;
            transition: all 0.2s ease;
            background-color: #1a1a1a;
        }
        .network-links a:hover {
            color: #ffffff;
            border-color: #00e5ff;
            background-color: #2a2a2a;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }
    </style>
</head>
<body>
    <div style="display: flex; justify-content: center; gap: 10px; padding: 20px 10px 0 10px; flex-wrap: wrap;">
        <a href="index.html" style="background: #ffd700; color: #000; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 0.95em;">🎬 Movie Library</a>
        <a href="guide.html" style="background: #ffd700; color: #000; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 0.95em;">🍿 Home Theater 101</a>
        <a href="hardware.html" style="background: #ffd700; color: #000; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 0.95em;">⚙️ Hardware Guide</a>
    </div>

    <header>
        <h1>Tech News & Radar</h1>
        <p>Tracking the latest home cinema announcements before they hit the UAE</p>
    </header>

    <div class="container">
        <div class="filter-section" style="text-align: center; margin: 50px 0; font-family: 'Inter', sans-serif;">
    <label for="brand-filter" style="color: #ffd700; font-weight: bold; margin-right: 15px; letter-spacing: 2px; font-size: 14px; text-transform: uppercase;">Browse By Brand:</label>
    <select id="brand-filter" onchange="filterNews()" style="background: #000; color: #ffd700; border: 2px solid #ffd700; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; outline: none; transition: 0.3s; appearance: none; -webkit-appearance: none; text-align: center; min-width: 250px;">
        <option value="all">View All Updates</option>
        <option value="Bose">Bose</option>
        <option value="Denon">Denon</option>
        <option value="Elac">Elac</option>
        <option value="Hisense">Hisense</option>
        <option value="JBL">JBL</option>
        <option value="KEF">KEF</option>
        <option value="Klipsch">Klipsch</option>
        <option value="LG">LG</option>
        <option value="Marantz">Marantz</option>
        <option value="Nakamichi">Nakamichi</option>
        <option value="Onkyo">Onkyo</option>
        <option value="Pioneer">Pioneer</option>
        <option value="Polk Audio">Polk Audio</option>
        <option value="Samsung">Samsung</option>
        <option value="Sennheiser">Sennheiser</option>
        <option value="Sonos">Sonos</option>
        <option value="Sony">Sony</option>
        <option value="SVS">SVS</option>
        <option value="TCL">TCL</option>
        <option value="Ultimea">Ultimea</option>
        <option value="Yamaha">Yamaha</option>
    </select>
</div>        <div class="news-grid" id="news-container">
            </div>
    </div>
    <div class="network-footer">
        <h4>Explore The Dubai Tech Network</h4>
        <div class="network-links">
            <a href="https://kalpdev2010-hub.github.io/dubai-cinema-guide/" target="_blank">Home Cinema Guide</a>
            <a href="https://kalpdev2010-hub.github.io/dubai-dj-guide/" target="_blank">Pro DJ Guide</a>
            <a href="https://kalpdev2010-hub.github.io/dubai-gaming-guide/" target="_blank">Gaming Setup Guide</a>
        </div>
    </div>

    <script>
    let allIssues = [];

        // 1. Initial Fetch from GitHub
        function fetchNews() {
            fetch('https://api.github.com/repos/kalpdev2010-hub/dubai-cinema-guide/issues?state=open')
                .then(response => response.json())
                .then(issues => {
                    allIssues = issues;
                    renderCards(issues);
                })
                .catch(err => console.error("Error loading news feed:", err));
        }

        // 2. The Card Building Engine
        function renderCards(issues) {
            const container = document.getElementById('news-container');
            container.innerHTML = ''; 

                        if (issues.length === 0) {
                container.innerHTML = `
                    <div style="
                        color: white; 
                        text-align: center; 
                        grid-column: 1 / -1; 
                        width: 100%; 
                        padding: 100px 20px; 
                        font-family: 'Inter', sans-serif;
                        font-size: 18px;
                        letter-spacing: 1px;
                        opacity: 0.7;
                    ">
                        No updates found for this brand yet. Stay tuned!
                    </div>`;
                return;
            }


            issues.forEach(issue => {
                const brand = issue.labels.length > 0 ? issue.labels[0].name : 'AV Update';
                const date = new Date(issue.created_at).toLocaleDateString('en-AE', { day: 'numeric', month: 'short', year: 'numeric' });

                const card = document.createElement('div');
                card.className = 'news-card';
                
                card.innerHTML = `
                    <div class="status-badge">AV RADAR</div>
                    <div class="news-date">Spotted: ${date}</div>
                    <h2 class="news-title">${brand} Home Cinema</h2>
                    <div class="news-headline">${issue.title}</div>
                    <p class="news-desc" style="margin-top: 20px;">
                        <a href="${issue.body}" target="_blank" style="color:#ffd700; text-decoration:none; font-weight:bold; border: 1px solid #ffd700; padding: 8px 15px; border-radius: 4px; display: inline-block;">Explore Full Specs ➔</a>
                    </p>
                `;
                container.appendChild(card);
            });
        }

        // 3. The Filter Function
        function filterNews() {
            const selectedBrand = document.getElementById('brand-filter').value;
            if (selectedBrand === 'all') {
                renderCards(allIssues);
            } else {
                const filtered = allIssues.filter(issue => {
                    const brandLabel = issue.labels.length > 0 ? issue.labels[0].name : '';
                    return brandLabel.toLowerCase() === selectedBrand.toLowerCase();
                });
                renderCards(filtered);
            }
        }

        // Start the engine
        fetchNews();    
    </script>

</body>
</html>
