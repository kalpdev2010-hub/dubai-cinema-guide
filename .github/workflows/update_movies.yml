name: Weekly Movie Library Update

on:
  schedule:
    - cron: '0 0 * * 5'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Wake up the Bot (Run Script)
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python update_library.py

      - name: Save new data to the Vault
        run: |
          git config --global user.name 'GitHub Automation Bot'
          git config --global user.email 'bot@dubiatechnetwork.com'
          git add movies.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-added new movies to the vault" && git push)
